name: Test and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'testing-example/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install dependencies
        run: npm install
        working-directory: testing-example

      - name: run tests
        run: npm test
        working-directory: testing-example

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: success
        run: echo "Tests erfolgreich - Deployment kann starten"
